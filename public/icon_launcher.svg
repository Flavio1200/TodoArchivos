<svg width="100%" height="100%" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Beautiful vivid green-to-cyan diagonal linear gradient -->
    <linearGradient id="launcherGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22c55e" />
      <stop offset="50%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
  </defs>
  
  <!-- Launcher Background is a smooth iOS-style squircle matching our app icon -->
  <rect width="512" height="512" rx="112" fill="url(#launcherGrad)" />
  
  <g fill="none" stroke="#FFFFFF" stroke-width="18" stroke-linecap="round" stroke-linejoin="round">
    <!-- Horizontal bar of 'T' joining top-left of the Box -->
    <line x1="85" y1="160" x2="180" y2="160" />
    
    <!-- Vertical stem of 'T' going down to align with Box bottom -->
    <line x1="125" y1="160" x2="125" y2="350" />
    
    <!-- Outer Box enclosing the 'A' -->
    <rect x="180" y="160" width="230" height="190" rx="16" />
    
    <!-- Symmetrical letter 'A' centered inside the box -->
    <path d="M 235 310 L 295 200 L 355 310 M 258 272 L 332 272" />
  </g>
</svg>
